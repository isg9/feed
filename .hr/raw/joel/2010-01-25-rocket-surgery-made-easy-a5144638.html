<p><a href="http://www.sensible.com/rocketsurgery/index.html"><img data-recalc-dims="1" decoding="async" style="MARGIN-LEFT: 5px" border="0" alt="" align="right" src="https://i0.wp.com/www.joelonsoftware.com/wp-content/uploads/2010/01/25Krug.png?w=730&#038;ssl=1" /></a><a href="http://www.sensible.com/">Steve Krug</a> has written a follow up to his usability classic <a href="http://www.sensible.com/dmmt.html"><em>Don’t Make Me Think</em></a><em>. </em>The sequel, <a href="http://www.sensible.com/rocketsurgery/index.html"><em>Rocket Surgery Made Easy</em></a><em>, </em>is a terrific, short, concise, fun guide to running simple “hallway” usability tests to improve the usability of your software and websites. Highly recommended.</p>
