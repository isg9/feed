<p>The conclusion of the <a href="http://www.openhardwaresummit.org/">Open Source Hardware Summit</a> has yielded a new <a href="http://freedomdefined.org/OSHW_draft">draft definition for open source hardware v0.4</a> as well as a draft statement of principles. Participate and add your comments <a href="http://www.openhardwaresummit.org/forum/viewtopic.php?f=5&#038;t=76">here</a>! For your browsing pleasure, <a href="http://blog.makezine.com/archive/2010/10/open-source_hardware_-_around_the_w.html">Make</a> also has a great collection of perspectives on the new definition. </p>
